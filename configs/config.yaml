# configs/config.yaml
# Central configuration — all magic numbers live here

data:
  raw_path: "data/raw/bank-additional/bank-additional-full.csv"
  sep: ";"
  target_col: "y"
  drop_cols:
    - "duration"   # leaks call outcome at inference time
  pdays_sentinel: 999  # means "never contacted"

split:
  test_size: 0.20
  random_state: 42
  stratify: true

preprocessing:
  numeric_strategy: "standard_scaler"   # standard_scaler | minmax | passthrough
  categorical_strategy: "onehot"        # onehot | ordinal
  handle_unknown: "ignore"

models:
  logistic_regression:
    max_iter: 5000
    class_weight: "balanced"
    solver: "lbfgs"
    C: 0.1

  random_forest:
    n_estimators: 400
    max_depth: 12
    min_samples_leaf: 20
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1

  xgboost:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: 7   # ≈ ratio of negatives to positives
    eval_metric: "aucpr"
    random_state: 42
    n_jobs: -1

  lightgbm:
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 63
    max_depth: -1          # unlimited, controlled by num_leaves
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1
    verbose: -1

optuna:
  n_trials: 50             # increase to 100+ for production
  timeout: 300             # seconds per model (5 min cap)
  direction: "maximize"
  metric: "average_precision"   # optimise PR-AUC (better for imbalance)
  cv_splits: 3             # faster inner CV during tuning
  random_state: 42

cross_validation:
  n_splits: 5
  scoring: ["roc_auc", "average_precision"]
  shuffle: true
  random_state: 42

business:
  contact_cost: 1.0          # £ per call
  revenue_per_conversion: 50.0   # £ per subscription
  default_capacity: 5000     # calls per day

artifacts:
  model_dir: "outputs/models"
  scored_customers: "outputs/scored_customers.csv"
  profit_curve: "outputs/profit_curve.csv"
  cv_results: "outputs/cv_results.csv"